version: 2

models:
  - name: int_sales_order_details
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null

  - name: int_product_catalog
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: category_name
        tests:
          - not_null

  - name: int_customer_profiles
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: int_inventory_status
    columns:
      - name: store_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null

  - name: int_staff_hierarchy
    columns:
      - name: staff_id
        tests:
          - unique
          - not_null
      - name: is_active
        tests:
          - not_null